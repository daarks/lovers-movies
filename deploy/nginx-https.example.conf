# Exemplo: Nginx na frente do Gunicorn (Flask) com HTTPS — PWA / Chrome "Instalar app"
# requer contexto seguro (HTTPS) exceto localhost. Ajuste server_name, caminhos de cert e upstream.
#
# Depois de certos emitidos (Let's Encrypt, etc.):
#   sudo ln -s /caminho/deste/ficheiro /etc/nginx/sites-enabled/movies-app
#   sudo nginx -t && sudo systemctl reload nginx
#
# O Gunicorn continua a ouvir em 127.0.0.1:8080 (ou o que FLASK_BIND definir localmente).

upstream movies_app_gunicorn {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;   # o teu domínio

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # ssl_trusted_certificate ... (opcional, OCSP stapling)

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    client_max_body_size 8M;

    # SSE: definir *antes* do `location /` — sem buffer e timeout alto
    location ~ ^/api/(swipe/stream/|couple/stream) {
        proxy_pass http://movies_app_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://movies_app_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix "";
        proxy_redirect off;
    }
}

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    return 301 https://$host$request_uri;
}
