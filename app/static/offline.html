<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6B21A8">
  <title>Offline — Nossa Lista</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
    .offline-card { max-width: 22rem; padding: 2rem; border-radius: 1rem; background: var(--surface, #1a1428); box-shadow: 0 8px 32px rgba(0,0,0,.35); }
  </style>
</head>
<body>
  <div class="offline-card">
    <p style="font-size:2.5rem;margin:0" aria-hidden="true">📡</p>
    <h1 style="margin:0.75rem 0 0.5rem;font-size:1.25rem">Sem conexão</h1>
    <p class="text-muted" style="margin:0;line-height:1.5">Você ainda pode abrir páginas já visitadas se estiverem em cache. Tente de novo quando a internet voltar.</p>
    <p style="margin-top:1.25rem"><a href="/" class="btn-primary" style="display:inline-block;text-decoration:none">Ir para início</a></p>
  </div>
</body>
</html>
