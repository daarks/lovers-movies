{% extends "base.html" %}
{% block title %}Assistimos hoje{% endblock %}
{% block body_class %}page-daily-calendar page-react{% endblock %}
{% block body %}
<main class="daily-calendar-main">
  <div id="calendar-root" class="calendar-shell" data-month="{{ month }}" aria-busy="true">
    <noscript>
      <section class="calendar-shell-fallback">
        <h1>Assistimos hoje</h1>
        <p>Essa área precisa de JavaScript ligado para mostrar o modo premium.</p>
      </section>
    </noscript>
    <section class="calendar-shell-fallback" aria-hidden="true">
      <p class="text-muted">Carregando calendário…</p>
    </section>
  </div>
</main>
{% endblock %}
{% block scripts_extra %}
{{ vite_entry_tags('calendar') }}
{% endblock %}
