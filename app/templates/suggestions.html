{% extends "base.html" %}
{% block title %}Sugestões{% endblock %}
{% block body_class %}page-suggestions page-react{% endblock %}
{% block body %}
<main class="suggestions-main" id="suggestions-page" data-page="suggestions">
  <div id="suggestions-root" class="suggestions-shell" aria-busy="true">
    <noscript>
      <section class="suggestions-shell-fallback">
        <h1>Sugestões</h1>
        <p>Essa área precisa de JavaScript ligado para mostrar o modo premium.</p>
      </section>
    </noscript>
    <section class="suggestions-shell-fallback" aria-hidden="true">
      <p class="text-muted">Carregando sugestões…</p>
    </section>
  </div>
</main>
{% endblock %}
{% block scripts_extra %}
{{ vite_entry_tags('suggestions') }}
{% endblock %}
