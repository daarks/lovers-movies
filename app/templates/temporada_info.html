{% extends "base.html" %}
{% block title %}Temporada{% endblock %}
{% block body_class %}page-season-info page-react{% endblock %}
{% block body %}
<main class="season-hub-main">
  <div id="season-root" class="season-shell" aria-busy="true">
    <noscript>
      <section class="season-shell-fallback">
        <h1>Temporada atual</h1>
        <p>Habilite JavaScript para ver os detalhes da temporada, conquistas sazonais e listas curadas.</p>
      </section>
    </noscript>
    <section class="season-shell-fallback" aria-hidden="true">
      <p class="text-muted">Preparando a temporada…</p>
    </section>
  </div>
</main>
{% endblock %}
{% block scripts_extra %}
{{ vite_entry_tags('season') }}
{% endblock %}
