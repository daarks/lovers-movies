{% extends "base.html" %}
{% block title %}Casal — Swipe{% endblock %}
{% block body_class %}page-couple page-react{% endblock %}
{% block nav_swipe %} is-active{% endblock %}
{% block body %}
<main class="couple-main">
  <div id="swipe-root" class="swipe-shell" aria-busy="true" data-api-prefix="{{ (request.script_root or '')|e }}">
    <noscript>
      <section class="swipe-shell-fallback">
        <h1>Modo casal</h1>
        <p>Essa tela precisa de JavaScript para o deck de swipe.</p>
      </section>
    </noscript>
    <section class="swipe-shell-fallback" aria-hidden="true">
      <p class="text-muted">Carregando deck…</p>
    </section>
  </div>
</main>
{% endblock %}
{% block scripts_extra %}
{{ vite_entry_tags('swipe') }}
{% endblock %}
