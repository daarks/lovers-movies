{% extends "base.html" %}
{% block title %}Mapa de países{% endblock %}
{% block body_class %}page-mapa page-react{% endblock %}
{% block body %}
<main class="mapa-main">
  <div id="map-root" class="map-shell" aria-busy="true">
    <noscript>
      <section class="map-shell-fallback">
        <h1>Mapa de países</h1>
        <p>Habilite JavaScript para ver o mapa interativo premium.</p>
      </section>
    </noscript>
    <section class="map-shell-fallback" aria-hidden="true">
      <p class="text-muted">Carregando mapa…</p>
    </section>
  </div>
  <p class="mapa-attrib text-muted">Mapa: <a href="https://commons.wikimedia.org/wiki/File:World_map_-_low_resolution.svg" rel="noopener noreferrer" target="_blank">Wikimedia Commons</a> (domínio público).</p>
</main>
{% endblock %}
{% block scripts_extra %}
{{ vite_entry_tags('map') }}
{% endblock %}
