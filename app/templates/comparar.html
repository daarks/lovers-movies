{% extends "base.html" %}
{% block title %}Comparar filmes e séries{% endblock %}
{% block body_class %}page-comparar page-comparar--react{% endblock %}
{% block body %}
<noscript>
  <div class="container" style="padding:2rem 1rem;">
    <p>Esta tela precisa de JavaScript ativo. Ative o JS no navegador para comparar títulos em tempo real com o TMDB.</p>
  </div>
</noscript>

<div
  id="comparar-root"
  class="comparar-shell"
  data-initial-a-id="{{ a_id|default('', true) }}"
  data-initial-a-mt="{{ a_mt|default('movie', true) }}"
  data-initial-b-id="{{ b_id|default('', true) }}"
  data-initial-b-mt="{{ b_mt|default('movie', true) }}"
  aria-busy="true"
>
  <div class="comparar-shell-fallback">
    <p class="text-muted">Carregando o comparador…</p>
  </div>
</div>
{% endblock %}

{% block scripts_extra %}
{{ vite_entry_tags('comparar') }}
{% endblock %}
